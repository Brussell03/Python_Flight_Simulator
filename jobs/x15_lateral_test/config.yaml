meta:
    job_name: "X15_Lateral_Test"
    description: "X-15 Mach 3.42 Lateral Test"

vehicle:
    model: "X15"

instructions:
    eom: "WGS84"
    integrator: "RK45"
    simulate: true
    perform_trim: false
    perform_linearization: false
    compare: true
    t0_s: 0.0
    tf_s: 5.5
    dt_s: 0.012

output:
    save_data: true
    show_plots: false
    plots:
        6dof: true
        attitude: true
        controls: true
        aerodynamics: true
        geodetic: true
        ned_velocity: true

compare:
    path: "comparison_data/X15_Rudder_Pulse_FT.npz"
    save_compare: true
    show_plots: true

initial_conditions:
    Mach: 3.42
    alpha_deg: 2.6
    beta_deg: 0.32
    h_m: 24824.436
    p_rps: -0.05
    q_rps: 0.0
    r_rps: -0.015
    phi_deg: 0.0
    theta_deg: -13.6
    psi_deg: 0.0
    dela_ach_deg: 0.0
    dele_ach_deg: 0.0
    delr_ach_deg: 0.0
    lat_deg: 32.335556
    long_deg: -106.405833
    m_fuel_kg: 0.0

control:
    type: "time_history"
    input_file: "comparison_data/.csv"
    aileron: true   # on if control input should act through it
    elevator: false # on if control input should act through it
    rudder: true    # on if control input should act through it
    sas: true
    Kq: 8
    Kp: 0
    Kyar: 0
    Kr: 0
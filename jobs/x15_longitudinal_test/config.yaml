meta:
    job_name: "X15_Longitudinal_Test"
    description: "X-15 Mach 3.25 Longitudinal Test"

vehicle:
    model: "X15"

instructions:
    eom: "WGS84"
    integrator: "RK45"
    simulate: true
    perform_trim: false
    perform_linearization: false
    compare: true
    t0_s: 0.0
    tf_s: 7.0
    dt_s: 0.012

output:
    save_data: true
    show_plots: false
    plots:
        6dof: true
        attitude: true
        controls: true
        aerodynamics: true
        geodetic: true
        ned_velocity: true

compare:
    path: "comparison_data/X15_Stabilizer_Pulse_FT.npz"
    save_compare: true
    show_plots: true

initial_conditions:
    Mach: 3.25
    alpha_deg: -2.0
    beta_deg: 0.0
    h_ft: 57300
    p_rps: 0.0
    q_rps: 0.1
    r_rps: 0.0
    phi_deg: 0.0
    theta_deg: 22.65
    psi_deg: 0.0
    dela_ach_deg: 0.0
    dele_ach_deg: 0.0
    delr_ach_deg: 0.0
    lat_deg: 32.335556
    long_deg: -106.405833
    m_fuel_kg: 0.0

control:
    type: "time_history"
    input_file: "comparison_data/longitudinal_flight_test_elevator_time_history_Yancey64.csv"
    aileron: false # on if control input should act through it
    elevator: true # on if control input should act through it
    rudder: false  # on if control input should act through it
    sas: true
    Kq: 0.0
    Kp: -7.0
    Kyar: 8.0
    Kr: 8.0